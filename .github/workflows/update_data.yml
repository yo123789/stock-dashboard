name: Stock Data Auto Update (v5)

on:
  schedule:
    - cron: '*/5 1-7 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install akshare pandas requests
      - run: python data_fetcher_v5.py
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dashboard_data.json history_v5.json index_v5.html
          git diff --staged --quiet || (git commit -m "Auto update v5 [skip ci]" && git push)
