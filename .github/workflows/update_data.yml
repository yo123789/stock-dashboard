name: 忙炉聫忙聴楼猫隆聦忙聝聟忙聲掳忙聧庐忙聸麓忙聳掳

on:
  schedule:
    # 氓聦聴盲潞卢忙聴露茅聴麓忙炉聫盲赂陋盲潞陇忙聵聯忙聴楼盲赂聥氓聧聢16:00茂录聢UTC 8:00茂录聣
    - cron: '0 8 * * 1-5'
  workflow_dispatch:  # 氓聟聛猫庐赂忙聣聥氓聤篓猫搂娄氓聫聭

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 忙拢聙氓聡潞盲禄拢莽聽聛
        uses: actions/checkout@v4

      - name: 氓庐聣猫拢聟 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 氓庐聣猫拢聟盲戮聺猫碌聳
        run: |
          pip install akshare pandas

      - name: 猫驴聬猫隆聦忙聲掳忙聧庐茅聡聡茅聸聠
        run: |
          python data_fetcher.py

      - name: 忙聫聬盲潞陇忙聸麓忙聳掳
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json data/
          git diff --staged --quiet || git commit -m "冒聼聯聤 猫聡陋氓聤篓忙聸麓忙聳掳猫隆聦忙聝聟忙聲掳忙聧庐 $(date +%Y-%m-%d)"
          git push

